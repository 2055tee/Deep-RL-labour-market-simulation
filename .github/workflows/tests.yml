name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-timeout

      - name: Run unit tests
        run: pytest "software test/test_unit.py" -v --junitxml=results/unit.xml

      - name: Run integration tests
        run: pytest "software test/test_integration.py" -v --junitxml=results/integration.xml

      - name: Run system tests
        run: pytest "software test/test_system.py" -v --timeout=60 --junitxml=results/system.xml

      - name: Coverage report
        run: pytest "software test/" --ignore="software test/test_acceptance.py" --cov=. --cov-report=term-missing --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
